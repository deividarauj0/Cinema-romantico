<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinema da Sofia e Deivid 💕</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&display=swap');
        
        body { font-family: 'Nunito', sans-serif; color: #f8fafc; }
        .movie-card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .movie-card:hover { transform: translateY(-8px) scale(1.02); }
        .watched-overlay { background: rgba(20, 10, 30, 0.7); backdrop-filter: blur(3px); }
        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #f43f5e; border-radius: 10px; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

        .bg-romantic {
            background: radial-gradient(circle at top right, #3b0764, #0f172a 40%),
                        radial-gradient(circle at bottom left, #4c1d95, #0f172a 40%);
            background-attachment: fixed;
        }

        @keyframes highlight-card {
            0%, 100% { box-shadow: 0 0 0 rgba(244, 63, 94, 0); border-color: rgba(159, 18, 57, 0.2); transform: scale(1); }
            50% { box-shadow: 0 0 30px rgba(244, 63, 94, 0.8); border-color: rgba(244, 63, 94, 1); transform: scale(1.05); z-index: 10; }
        }
        .highlight-active { animation: highlight-card 1.5s ease-in-out 2; border-color: rgba(244, 63, 94, 0.8) !important; }
    </style>
</head>
<body class="min-h-screen pb-12 custom-scrollbar bg-romantic">

    <header class="bg-slate-950/40 backdrop-blur-md border-b border-rose-900/30 sticky top-0 z-50 px-4 py-3 shadow-2xl">
        <div class="max-w-6xl mx-auto flex flex-col gap-3">
            <div class="flex items-center justify-between gap-3">
                <h1 class="text-xl md:text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-rose-400 to-pink-300 flex items-center gap-2">
                    <span>🍿</span> Cinema da Sofia e Deivid
                </h1>
                <span id="sync-status" class="text-xs font-bold text-rose-300 bg-rose-900/40 px-2 py-1 rounded-md animate-pulse">☁️ Conectando...</span>
            </div>
            
            <div class="flex items-center gap-2 w-full mt-1">
                <input id="search" type="text" placeholder="Buscar um filme..." 
                    class="bg-black/20 border border-rose-900/30 rounded-xl px-4 py-2 w-full focus:ring-2 focus:ring-rose-500 transition-all outline-none text-rose-100 placeholder-rose-300/50 text-sm">
                
                <button onclick="randomPick()" class="bg-rose-950/50 hover:bg-rose-900 text-rose-300 p-2 rounded-xl transition-all border border-rose-800/50 shadow-lg shrink-0 flex items-center justify-center h-[38px] w-[38px]">
                    <span class="text-lg">🎲</span>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 mt-8">
        <div class="flex gap-3 mb-8 overflow-x-auto pb-4 scrollbar-hide">
            <button onclick="setFilter('all')" id="filter-all" class="bg-rose-600 text-white px-6 py-2.5 rounded-full text-sm font-bold transition-all shadow-lg whitespace-nowrap border border-rose-500">Nossa Coleção</button>
            <button onclick="setFilter('conchinha')" id="filter-conchinha" class="bg-slate-900/60 text-rose-200 px-6 py-2.5 rounded-full text-sm font-semibold transition-all whitespace-nowrap border border-rose-900/30">🛋️ Ver de Conchinha</button>
            <button onclick="setFilter('cinema')" id="filter-cinema" class="bg-slate-900/60 text-rose-200 px-6 py-2.5 rounded-full text-sm font-semibold transition-all whitespace-nowrap border border-rose-900/30">🍿 Ver no Cinema</button>
            <button onclick="setFilter('assistido')" id="filter-assistido" class="bg-slate-900/60 text-rose-200 px-6 py-2.5 rounded-full text-sm font-semibold transition-all whitespace-nowrap border border-rose-900/30">✅ Já Assistimos</button>
        </div>

        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6" id="grid"></div>

        <div id="empty-state" class="hidden text-center py-24">
            <div class="text-7xl mb-6 animate-bounce">🥺</div>
            <h3 class="text-2xl font-bold text-rose-300">Nossa lista está vazia!</h3>
            <p class="text-rose-200/60 mt-2">Toque no botão ➕ abaixo para adicionar um filme!</p>
        </div>
    </main>

    <button onclick="openAddModal()" class="fixed bottom-6 right-6 md:bottom-10 md:right-10 bg-gradient-to-r from-rose-600 to-pink-600 text-white rounded-full w-16 h-16 flex items-center justify-center shadow-[0_0_20px_rgba(225,29,72,0.5)] z-40 text-3xl hover:scale-110 active:scale-95 transition-all">➕</button>

    <div id="add-movie-modal" class="fixed inset-0 bg-slate-950/90 z-[100] hidden items-center justify-center p-4 backdrop-blur-md transition-all">
        <div class="bg-slate-900 p-6 md:p-8 rounded-[2rem] max-w-lg w-full text-left border border-rose-800/50 shadow-[0_0_50px_rgba(225,29,72,0.15)] relative max-h-[95vh] overflow-y-auto custom-scrollbar">
            <button onclick="closeAddModal()" class="absolute top-5 right-5 text-rose-300/50 hover:text-rose-300 text-2xl font-bold w-10 h-10 flex items-center justify-center rounded-full">✕</button>
            <h2 class="text-2xl font-black mb-6 flex items-center gap-2 text-rose-200"><span>💌</span> Novo Filme</h2>
            
            <div class="flex flex-col gap-4">
                <input id="newTitle" type="text" placeholder="Qual o nome do filme?" class="bg-black/30 border border-rose-900/30 rounded-2xl px-5 py-4 focus:border-rose-500 outline-none text-rose-100 placeholder-rose-300/40 w-full text-lg shadow-inner">
                
                <label for="newImgFile" class="relative flex items-center justify-center bg-black/30 border-2 border-dashed border-rose-900/50 rounded-2xl px-5 py-8 cursor-pointer hover:border-rose-500 transition-all group w-full shadow-inner">
                    <input type="file" id="newImgFile" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" onchange="updateFileName(this)">
                    <div class="flex flex-col items-center gap-2 text-rose-300/60 text-center">
                        <span class="text-5xl mb-2">📸</span>
                        <span id="fileNameDisplay" class="text-sm font-semibold">Tocar para escolher foto<br><span class="text-xs opacity-70">(ou deixe vazio para capa padrão)</span></span>
                    </div>
                </label>

                <div class="flex gap-2 w-full mt-2">
                    <label class="flex-1 text-center cursor-pointer">
                        <input type="radio" name="newStatus" value="conchinha" checked class="peer hidden">
                        <div class="bg-black/30 border border-rose-900/30 rounded-xl py-3 peer-checked:bg-pink-600/30 peer-checked:border-pink-500 transition-all text-sm font-bold text-rose-200">🛋️ Casa</div>
                    </label>
                    <label class="flex-1 text-center cursor-pointer">
                        <input type="radio" name="newStatus" value="cinema" class="peer hidden">
                        <div class="bg-black/30 border border-rose-900/30 rounded-xl py-3 peer-checked:bg-purple-600/30 peer-checked:border-purple-500 transition-all text-sm font-bold text-rose-200">🍿 Cinema</div>
                    </label>
                    <label class="flex-1 text-center cursor-pointer">
                        <input type="radio" name="newStatus" value="assistido" class="peer hidden">
                        <div class="bg-black/30 border border-rose-900/30 rounded-xl py-3 peer-checked:bg-rose-600/30 peer-checked:border-rose-500 transition-all text-sm font-bold text-rose-200">✅ Visto</div>
                    </label>
                </div>

                <button onclick="addMovie()" class="bg-gradient-to-r from-rose-600 to-pink-600 text-white font-black text-xl py-4 rounded-2xl transition-all active:scale-95 w-full mt-2">Adicionar 💕</button>
            </div>
        </div>
    </div>

    <div id="modal" class="fixed inset-0 bg-slate-950/80 z-[100] hidden items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-slate-900 p-8 rounded-[2rem] max-w-lg w-full text-center border border-rose-800/50">
            <p class="text-rose-400 font-extrabold uppercase tracking-widest text-xs mb-3 bg-rose-950/50 inline-block px-4 py-1.5 rounded-full">Sugestão Mágica</p>
            <h2 id="modal-title" class="text-3xl font-black mb-4 text-transparent bg-clip-text bg-gradient-to-r from-rose-100 to-pink-200"></h2>
            <div id="modal-content" class="text-rose-100/80 text-base mb-8 font-medium"></div>
            <div class="flex flex-col gap-3">
                <button id="modal-action-btn" class="bg-gradient-to-r from-rose-600 to-pink-600 w-full py-4 rounded-2xl font-black text-lg">Perfeito! ❤️</button>
                <button onclick="closeModal()" class="text-rose-300/60 font-bold text-sm py-2">Fechar</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // =========================================================================
        // COLOQUE O SEU FIREBASE CONFIG AQUI DENTRO
        // Substitua os dados abaixo pelo que o Firebase te deu.
        // =========================================================================
        const firebaseConfig = {
            apiKey: "AIzaSyDhtpqWtX5UfxGw21sSC3MLKMLYjF9rqJo",
            authDomain: "cinema-romantico.firebaseapp.com",
            projectId: "cinema-romantico",
            storageBucket: "cinema-romantico.firebasestorage.app",
            messagingSenderId: "1056799151155",
            appId: "1:1056799151155:web:d5b787a2548396179e7f46",
            measurementId: "G-P6C7295DRJ"
        };
        // =========================================================================

        const originalList = [
            { id: 1, title: "Os Vingadores", img: "https://image.tmdb.org/t/p/w500/RYMX2wcKCBAr24UyPD7xwmjaTn.jpg", status: 'conchinha', rating: 0, synopsis: "" },
            { id: 2, title: "Vingadores Era de Ultron", img: "https://image.tmdb.org/t/p/w500/4ssDuvEDkSArWEdyBl2X5EHvYKU.jpg", status: 'conchinha', rating: 0, synopsis: "" },
            { id: 3, title: "Vingadores Guerra Infinita", img: "https://image.tmdb.org/t/p/w500/7WsyChQLEftFiDOVTGkv3hFpyyt.jpg", status: 'conchinha', rating: 0, synopsis: "" },
            { id: 4, title: "Vingadores Ultimato", img: "https://image.tmdb.org/t/p/w500/or06FN3Dka5tukK1e9sl16pB3iy.jpg", status: 'conchinha', rating: 0, synopsis: "" },
            { id: 5, title: "A Culpa é das Estrelas", img: "https://m.media-amazon.com/images/I/91RXDK2vhzL._AC_UF1000,1000_QL80_.jpg", status: 'conchinha', rating: 0, synopsis: "" },
            { id: 6, title: "Como Eu Era Antes de Você", img: "https://m.media-amazon.com/images/M/MV5BMjQ4ZGMyZjYtNDYwNC00MmUyLWE4ZWQtM2ViMTQ0OTc1M2U1XkEyXkFqcGc@._V1_FMjpg_UX1000_.jpg", status: 'conchinha', rating: 0, synopsis: "" },
            { id: 7, title: "Devoradores de Estrelas", img: "./image_5f9dfb.jpg", status: 'cinema', rating: 0, synopsis: "" },
            { id: 8, title: "Homem Aranha Um novo dia", img: "./image_5f9d65.jpg", status: 'cinema', rating: 0, synopsis: "" },
            { id: 9, title: "Vingadores Doomsday", img: "./image_5f9ddc.png", status: 'cinema', rating: 0, synopsis: "" }
        ];

        let movies = [];
        let currentFilter = 'all';
        let db = null;
        let isCloudActive = false;

        // Verifica se o usuário ainda está usando as chaves falsas (placeholder)
        const isPlaceholder = firebaseConfig.projectId === "SEU_PROJETO";

        if (!isPlaceholder) {
            try {
                const app = initializeApp(firebaseConfig);
                db = getFirestore(app);
                isCloudActive = true;
                
                const moviesRef = collection(db, "movies");
                onSnapshot(moviesRef, (snapshot) => {
                    movies = [];
                    snapshot.forEach((doc) => {
                        movies.push({ id: doc.id, ...doc.data() });
                    });
                    
                    movies.sort((a, b) => b.createdAt - a.createdAt);
                    
                    const statusBadge = document.getElementById('sync-status');
                    statusBadge.innerText = "☁️ Online";
                    statusBadge.classList.remove('animate-pulse');
                    statusBadge.classList.add('bg-green-900/40', 'text-green-300');
                    
                    render();
                }, (error) => {
                    console.error("Erro no banco:", error);
                    fallbackToLocal("❌ Erro Nuvem (Verifique Regras)");
                });
            } catch(e) {
                console.error("Erro ao inicializar:", e);
                fallbackToLocal("❌ Erro de Conexão");
            }
        } else {
            // Entra aqui automaticamente se o usuário não alterou o firebaseConfig
            fallbackToLocal("⚠️ Falta Configurar Firebase");
            setTimeout(() => {
                alert("Olá! O sistema tentou se conectar à nuvem mas as chaves (firebaseConfig) no código ainda estão como 'SEU_PROJETO'. Enquanto você não cola as chaves reais do seu Firebase, o aplicativo vai salvar tudo na memória local do seu aparelho!");
            }, 1000);
        }

        // Função de segurança: se a nuvem falhar ou não estiver configurada, o app não quebra!
        function fallbackToLocal(message) {
            isCloudActive = false;
            const statusBadge = document.getElementById('sync-status');
            statusBadge.innerText = message;
            statusBadge.classList.remove('animate-pulse');
            statusBadge.classList.add('bg-red-900/40', 'text-red-300');

            let localMovies = JSON.parse(localStorage.getItem('couple_movies_v4'));
            if (!localMovies || localMovies.length === 0) {
                movies = originalList;
                saveLocal();
            } else {
                movies = localMovies;
            }
            render();
        }

        function saveLocal() {
            try {
                localStorage.setItem('couple_movies_v4', JSON.stringify(movies));
            } catch (e) {
                console.error("Memória cheia!", e);
            }
        }

        // --- INTEGRAÇÃO COM A INTERFACE E NUVEM ---
        window.saveMovieToCloud = async function(id, data) {
            if (isCloudActive && db) {
                try {
                    await setDoc(doc(db, "movies", String(id)), data);
                } catch(e) {
                    console.error(e);
                    alert("Acesso negado. Certifique-se de que o seu banco de dados Firebase está em 'Modo de Teste' nas Regras.");
                }
            } else {
                const existingIndex = movies.findIndex(m => String(m.id) === String(id));
                if(existingIndex >= 0) {
                    movies[existingIndex] = { id: String(id), ...data };
                } else {
                    movies.unshift({ id: String(id), ...data });
                }
                saveLocal();
                render();
            }
        };

        window.deleteMovieFromCloud = async function(id) {
            if(confirm("Deseja remover este filme para sempre?")) {
                if (isCloudActive && db) {
                    await deleteDoc(doc(db, "movies", String(id)));
                } else {
                    movies = movies.filter(m => String(m.id) !== String(id));
                    saveLocal();
                    render();
                }
            }
        };

        window.addMovie = function() {
            const titleInput = document.getElementById('newTitle');
            const fileInput = document.getElementById('newImgFile');
            if (!titleInput.value.trim()) return;

            if (fileInput.files && fileInput.files.length > 0) {
                const file = fileInput.files[0];
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        const maxWidth = 400; 
                        const scale = maxWidth / img.width;
                        canvas.width = maxWidth; canvas.height = img.height * scale;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        const finalImg = canvas.toDataURL('image/jpeg', 0.6); // Bem leve
                        completeAddMovie(titleInput.value, finalImg);
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            } else {
                const finalImg = `https://via.placeholder.com/300x450/4c1d95/f43f5e?text=${encodeURIComponent(titleInput.value)}`;
                completeAddMovie(titleInput.value, finalImg);
            }
        }

        function completeAddMovie(title, imgData) {
            const status = document.querySelector('input[name="newStatus"]:checked').value;
            const docId = Date.now().toString();
            
            saveMovieToCloud(docId, {
                title: title,
                img: imgData,
                status: status,
                rating: 0,
                createdAt: Date.now()
            });

            document.getElementById('newTitle').value = "";
            document.getElementById('newImgFile').value = "";
            document.getElementById('fileNameDisplay').innerHTML = 'Tocar para escolher foto<br><span class="text-xs opacity-70">(ou deixe vazio para capa padrão)</span>';
            window.closeAddModal();
        }

        window.changeStatus = function(id, newStatus) {
            const movie = movies.find(m => String(m.id) === String(id));
            if(movie) {
                const dataToSave = { ...movie, status: newStatus };
                delete dataToSave.id;
                saveMovieToCloud(id, dataToSave);
            }
        }

        window.rate = function(id, val) {
            const movie = movies.find(m => String(m.id) === String(id));
            if(movie) {
                const dataToSave = { ...movie, rating: val };
                delete dataToSave.id;
                saveMovieToCloud(id, dataToSave);
            }
        }

        // Funções Visuais e Filtros
        window.setFilter = function(filter) {
            currentFilter = filter;
            document.querySelectorAll('[id^="filter-"]').forEach(btn => {
                btn.className = "bg-slate-900/60 text-rose-200 px-6 py-2.5 rounded-full text-sm font-semibold transition-all whitespace-nowrap border border-rose-900/30";
            });
            document.getElementById(`filter-${filter}`).className = "bg-rose-600 text-white px-6 py-2.5 rounded-full text-sm font-bold transition-all shadow-lg whitespace-nowrap border border-rose-500";
            render();
        }

        window.updateFileName = function(input) {
            const display = document.getElementById('fileNameDisplay');
            if (input.files && input.files.length > 0) {
                display.innerHTML = `<span class="text-rose-400 font-bold">✅ Foto pronta!</span><br><span class="text-xs text-rose-200">${input.files[0].name}</span>`;
            } else {
                display.innerHTML = 'Tocar para escolher foto<br><span class="text-xs opacity-70">(ou deixe vazio para capa padrão)</span>';
            }
        }

        window.randomPick = function() {
            const pending = movies.filter(m => m.status !== 'assistido');
            if (pending.length === 0) return alert("Vocês já viram todos os filmes da lista!");
            const random = pending[Math.floor(Math.random() * pending.length)];
            const ondeVer = random.status === 'cinema' ? "Para ver no Cinema 🍿" : "Sessão de Conchinha 🛋️";
            
            document.getElementById('modal-title').innerText = random.title;
            document.getElementById('modal-content').innerText = ondeVer;
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modal').classList.add('flex');
            
            document.getElementById('modal-action-btn').onclick = () => {
                window.closeModal();
                window.scrollToMovie(random.id, random.status);
            };
        }

        window.scrollToMovie = function(id, status) {
            if (currentFilter !== 'all' && currentFilter !== status) window.setFilter(status);
            setTimeout(() => {
                const card = document.getElementById(`movie-${id}`);
                if (card) {
                    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    card.classList.add('highlight-active');
                    setTimeout(() => { card.classList.remove('highlight-active'); }, 3000);
                }
            }, 100);
        }

        window.closeModal = () => { document.getElementById('modal').classList.add('hidden'); document.getElementById('modal').classList.remove('flex'); }
        window.openAddModal = () => { document.getElementById('add-movie-modal').classList.remove('hidden'); document.getElementById('add-movie-modal').classList.add('flex'); }
        window.closeAddModal = () => { document.getElementById('add-movie-modal').classList.add('hidden'); document.getElementById('add-movie-modal').classList.remove('flex'); }

        // Renderizador
        function render() {
            const grid = document.getElementById("grid");
            const emptyState = document.getElementById("empty-state");
            const searchTerm = document.getElementById("search").value.toLowerCase();

            let filtered = movies.filter(m => m.title.toLowerCase().includes(searchTerm));
            if (currentFilter !== 'all') filtered = filtered.filter(m => m.status === currentFilter);

            grid.innerHTML = "";
            emptyState.classList.toggle('hidden', filtered.length > 0);

            filtered.forEach(m => {
                const card = document.createElement("div");
                card.id = `movie-${m.id}`;
                card.className = `movie-card relative bg-slate-900/50 backdrop-blur-sm rounded-3xl overflow-hidden shadow-xl border border-rose-900/20 flex flex-col group hover:border-rose-500/50`;

                let starsHtml = "";
                for(let i=1; i<=5; i++) {
                    const colorClass = i <= m.rating ? 'text-rose-500 scale-110' : 'text-white/20';
                    starsHtml += `
                        <button type="button" class="cursor-pointer transition-all p-1 -m-1 active:scale-125 ${colorClass}" onclick="rate('${m.id}', ${i})">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-6 h-6 drop-shadow-md">
                                <path d="M11.645 20.91l-.007-.003-.022-.012a15.247 15.247 0 01-.383-.218 25.18 25.18 0 01-4.244-3.17C4.688 15.36 2.25 12.174 2.25 8.25 2.25 5.322 4.714 3 7.688 3A5.5 5.5 0 0112 5.052 5.5 5.5 0 0116.313 3c2.973 0 5.437 2.322 5.437 5.25 0 3.925-2.438 7.111-4.739 9.256a25.175 25.175 0 01-4.244 3.17 15.247 15.247 0 01-.383.219l-.022.012-.007.004-.003.001a.752.752 0 01-.704 0l-.003-.001z" />
                            </svg>
                        </button>`;
                }

                card.innerHTML = `
                    <div class="relative aspect-[2/3] overflow-hidden">
                        <img src="${m.img}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" onerror="if(!this.src.includes('placeholder')) this.src='https://via.placeholder.com/300x450/4c1d95/f43f5e?text=Sem+Capa'">
                        
                        ${m.status === 'assistido' ? `<div class="watched-overlay absolute inset-0 flex items-center justify-center z-10"><span class="bg-rose-600 text-white px-4 py-1.5 rounded-full text-[11px] font-black uppercase tracking-widest shadow-lg flex items-center gap-1 border border-rose-400">Assistido 💕</span></div>` : ''}
                        ${m.status === 'cinema' ? `<div class="absolute top-3 right-3 z-10"><span class="bg-purple-600/90 text-white px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest border border-purple-400">🍿 Cinema</span></div>` : ''}

                        <div class="absolute inset-0 bg-gradient-to-t from-slate-950 via-slate-900/60 to-transparent opacity-0 group-hover:opacity-100 transition-all duration-300 flex flex-col justify-end p-3 z-20">
                            <div class="flex flex-col gap-2 translate-y-4 group-hover:translate-y-0 transition-transform duration-300">
                                <div class="flex gap-2">
                                    <button onclick="changeStatus('${m.id}', 'conchinha')" class="flex-1 ${m.status === 'conchinha' ? 'bg-pink-600' : 'bg-white/10'} text-white text-lg py-1.5 rounded-xl border border-white/10 backdrop-blur-md" title="Em Casa">🛋️</button>
                                    <button onclick="changeStatus('${m.id}', 'cinema')" class="flex-1 ${m.status === 'cinema' ? 'bg-purple-600' : 'bg-white/10'} text-white text-lg py-1.5 rounded-xl border border-white/10 backdrop-blur-md" title="No Cinema">🍿</button>
                                    <button onclick="changeStatus('${m.id}', 'assistido')" class="flex-1 ${m.status === 'assistido' ? 'bg-rose-600' : 'bg-white/10'} text-white text-lg py-1.5 rounded-xl border border-white/10 backdrop-blur-md" title="Visto">✅</button>
                                </div>
                                <button onclick="deleteMovieFromCloud('${m.id}')" class="bg-rose-950/80 hover:bg-red-600 text-rose-300 hover:text-white px-3 py-2 rounded-xl transition-all text-xs font-bold flex justify-center gap-2"><span>🗑️</span> Remover</button>
                            </div>
                        </div>
                    </div>
                    <div class="p-4 bg-gradient-to-b from-transparent to-slate-950/50">
                        <h3 class="font-extrabold text-sm truncate mb-2 text-rose-50">${m.title}</h3>
                        <div class="flex justify-between items-center"><div class="flex gap-1">${starsHtml}</div></div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        document.getElementById("search").addEventListener("input", render);
    </script>
</body>
</html>
