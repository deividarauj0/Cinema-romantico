<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinema da Sofia e Deivid 💕</title>
    <!-- Tailwind CSS para design moderno -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&display=swap');
        
        body {
            font-family: 'Nunito', sans-serif;
            color: #f8fafc;
        }

        .movie-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .movie-card:hover {
            transform: translateY(-8px) scale(1.02);
        }

        .watched-overlay {
            background: rgba(20, 10, 30, 0.7);
            backdrop-filter: blur(3px);
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.2);
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #f43f5e; /* Rose 500 */
            border-radius: 10px;
        }

        @keyframes pulse-heart {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }
        .ai-pulse {
            animation: pulse-heart 2s infinite;
        }

        /* Nova animação para destacar o filme sorteado */
        @keyframes highlight-card {
            0%, 100% { box-shadow: 0 0 0 rgba(244, 63, 94, 0); border-color: rgba(159, 18, 57, 0.2); transform: scale(1); }
            50% { box-shadow: 0 0 30px rgba(244, 63, 94, 0.8); border-color: rgba(244, 63, 94, 1); transform: scale(1.05); z-index: 10; }
        }
        .highlight-active {
            animation: highlight-card 1.5s ease-in-out 2;
            border-color: rgba(244, 63, 94, 0.8) !important;
        }
        
        /* Ocultar barra de rolagem dos filtros (mantendo o scroll por toque) */
        .scrollbar-hide::-webkit-scrollbar {
            display: none; /* Chrome, Safari e Opera */
        }
        .scrollbar-hide {
            -ms-overflow-style: none; /* IE e Edge */
            scrollbar-width: none; /* Firefox */
        }

        /* Background animado sutil para dar um clima romântico */
        .bg-romantic {
            background: radial-gradient(circle at top right, #3b0764, #0f172a 40%),
                        radial-gradient(circle at bottom left, #4c1d95, #0f172a 40%);
            background-attachment: fixed;
        }
    </style>
</head>
<body class="min-h-screen pb-12 custom-scrollbar bg-romantic">

    <!-- Header Otimizado -->
    <header class="bg-slate-950/40 backdrop-blur-md border-b border-rose-900/30 sticky top-0 z-50 px-4 py-3 shadow-2xl">
        <div class="max-w-6xl mx-auto flex flex-col gap-3">
            <div class="text-center md:text-left flex items-center justify-center md:justify-start gap-3">
                <h1 class="text-xl md:text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-rose-400 to-pink-300 flex items-center gap-2">
                    <span>🍿</span> Cinema da Sofia e Deivid
                </h1>
                <!-- Nuvem de status de sincronização -->
                <span id="sync-status" class="text-xs font-bold text-rose-300 bg-rose-900/40 px-2 py-1 rounded-md animate-pulse">☁️ Sincronizando...</span>
            </div>
            
            <div class="flex items-center gap-2 w-full">
                <div class="relative flex-1">
                    <input id="search" type="text" placeholder="Buscar um filme..." 
                        class="bg-black/20 border border-rose-900/30 rounded-xl px-4 py-2 w-full focus:ring-2 focus:ring-rose-500 transition-all outline-none text-rose-100 placeholder-rose-300/50 text-sm">
                </div>
                
                <button onclick="randomPick()" class="bg-rose-950/50 hover:bg-rose-900 text-rose-300 p-2 rounded-xl transition-all border border-rose-800/50 shadow-lg shrink-0 flex items-center justify-center h-[38px] w-[38px]" title="Deixa o destino escolher 🎲">
                    <span class="text-lg">🎲</span>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 mt-8">
        
        <!-- Filtros Atualizados -->
        <div class="flex gap-3 mb-8 overflow-x-auto pb-4 scrollbar-hide">
            <button onclick="setFilter('all')" id="filter-all" class="bg-rose-600 text-white px-6 py-2.5 rounded-full text-sm font-bold transition-all shadow-lg shadow-rose-900/40 whitespace-nowrap border border-rose-500">Nossa Coleção</button>
            <button onclick="setFilter('conchinha')" id="filter-conchinha" class="bg-slate-900/60 hover:bg-slate-800 text-rose-200 px-6 py-2.5 rounded-full text-sm font-semibold transition-all whitespace-nowrap border border-rose-900/30 hover:border-rose-500/50">🛋️ Ver de Conchinha</button>
            <button onclick="setFilter('cinema')" id="filter-cinema" class="bg-slate-900/60 hover:bg-slate-800 text-rose-200 px-6 py-2.5 rounded-full text-sm font-semibold transition-all whitespace-nowrap border border-rose-900/30 hover:border-rose-500/50">🍿 Ver no Cinema</button>
            <button onclick="setFilter('assistido')" id="filter-assistido" class="bg-slate-900/60 hover:bg-slate-800 text-rose-200 px-6 py-2.5 rounded-full text-sm font-semibold transition-all whitespace-nowrap border border-rose-900/30 hover:border-rose-500/50">✅ Já Assistimos</button>
        </div>

        <!-- Grid de Filmes -->
        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6" id="grid">
            <!-- Os filmes entram aqui via JS -->
        </div>

        <!-- Estado Vazio -->
        <div id="empty-state" class="hidden text-center py-24">
            <div class="text-7xl mb-6 animate-bounce">🥺</div>
            <h3 class="text-2xl font-bold text-rose-300">Nossa lista está vazia!</h3>
            <p class="text-rose-200/60 mt-2">Toque no botão ➕ abaixo para adicionar um filme!</p>
        </div>
    </main>

    <!-- Botão Flutuante de Adicionar (Estilo App) -->
    <button onclick="openAddModal()" class="fixed bottom-6 right-6 md:bottom-10 md:right-10 bg-gradient-to-r from-rose-600 to-pink-600 text-white rounded-full w-16 h-16 flex items-center justify-center shadow-[0_0_20px_rgba(225,29,72,0.5)] z-40 text-3xl hover:scale-110 active:scale-95 transition-all">
        ➕
    </button>

    <!-- Modal de Adicionar Filme em Tela Cheia no Celular -->
    <div id="add-movie-modal" class="fixed inset-0 bg-slate-950/90 z-[100] hidden items-center justify-center p-4 backdrop-blur-md transition-all">
        <div class="bg-slate-900 p-6 md:p-8 rounded-[2rem] max-w-lg w-full text-left border border-rose-800/50 shadow-[0_0_50px_rgba(225,29,72,0.15)] animate-in slide-in-from-bottom-10 fade-in duration-300 relative max-h-[95vh] overflow-y-auto custom-scrollbar">
            
            <button onclick="closeAddModal()" class="absolute top-5 right-5 text-rose-300/50 hover:text-rose-300 text-2xl font-bold w-10 h-10 flex items-center justify-center rounded-full hover:bg-rose-950 transition-colors">✕</button>
            
            <h2 class="text-2xl font-black mb-6 flex items-center gap-2 text-rose-200">
                <span>💌</span> Novo Filme
            </h2>
            
            <div class="flex flex-col gap-4">
                <input id="newTitle" type="text" placeholder="Qual o nome do filme?" 
                    class="bg-black/30 border border-rose-900/30 rounded-2xl px-5 py-4 focus:border-rose-500 outline-none text-rose-100 placeholder-rose-300/40 transition-colors w-full text-lg shadow-inner">
                
                <!-- Botão de Upload Customizado para Celular -->
                <label for="newImgFile" class="relative flex items-center justify-center bg-black/30 border-2 border-dashed border-rose-900/50 rounded-2xl px-5 py-8 cursor-pointer hover:border-rose-500 hover:bg-rose-950/20 transition-all group w-full shadow-inner">
                    <input type="file" id="newImgFile" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" onchange="updateFileName(this)">
                    <div class="flex flex-col items-center gap-2 text-rose-300/60 group-hover:text-rose-300 transition-colors text-center">
                        <span class="text-5xl mb-2">📸</span>
                        <span id="fileNameDisplay" class="text-sm font-semibold">
                            Tocar para escolher foto da galeria<br>
                            <span class="text-xs font-normal opacity-70">(ou deixe vazio para uma capa padrão)</span>
                        </span>
                    </div>
                </label>

                <!-- Nova Escolha de Categoria ao Adicionar -->
                <div class="flex gap-2 w-full mt-2">
                    <label class="flex-1 text-center cursor-pointer">
                        <input type="radio" name="newStatus" value="conchinha" checked class="peer hidden">
                        <div class="bg-black/30 border border-rose-900/30 rounded-xl py-3 peer-checked:bg-pink-600/30 peer-checked:border-pink-500 transition-all text-sm font-bold text-rose-200">🛋️ Em Casa</div>
                    </label>
                    <label class="flex-1 text-center cursor-pointer">
                        <input type="radio" name="newStatus" value="cinema" class="peer hidden">
                        <div class="bg-black/30 border border-rose-900/30 rounded-xl py-3 peer-checked:bg-purple-600/30 peer-checked:border-purple-500 transition-all text-sm font-bold text-rose-200">🍿 No Cinema</div>
                    </label>
                    <label class="flex-1 text-center cursor-pointer">
                        <input type="radio" name="newStatus" value="assistido" class="peer hidden">
                        <div class="bg-black/30 border border-rose-900/30 rounded-xl py-3 peer-checked:bg-rose-600/30 peer-checked:border-rose-500 transition-all text-sm font-bold text-rose-200">✅ Já Visto</div>
                    </label>
                </div>

                <button onclick="addMovie()" class="bg-gradient-to-r from-rose-600 to-pink-600 hover:from-rose-500 hover:to-pink-500 text-white font-black text-xl py-4 rounded-2xl transition-all shadow-lg shadow-rose-900/30 active:scale-95 flex items-center justify-center gap-2 w-full mt-2">
                    Adicionar Filme 💕
                </button>
            </div>
        </div>
    </div>

    <!-- Modal de Sugestão -->
    <div id="modal" class="fixed inset-0 bg-slate-950/80 z-[100] hidden items-center justify-center p-4 backdrop-blur-md transition-all">
        <div class="bg-slate-900 p-8 rounded-[2rem] max-w-lg w-full text-center border border-rose-800/50 shadow-[0_0_50px_rgba(225,29,72,0.15)] animate-in fade-in zoom-in duration-300">
            <p id="modal-tag" class="text-rose-400 font-extrabold uppercase tracking-widest text-xs mb-3 bg-rose-950/50 inline-block px-4 py-1.5 rounded-full">Sugestão Mágica</p>
            <h2 id="modal-title" class="text-3xl font-black mb-4 text-transparent bg-clip-text bg-gradient-to-r from-rose-100 to-pink-200"></h2>
            <div id="modal-content" class="text-rose-100/80 text-base leading-relaxed mb-8 max-h-48 overflow-y-auto custom-scrollbar pr-3 font-medium"></div>
            <div class="flex flex-col gap-3">
                <button id="modal-action-btn" class="bg-gradient-to-r from-rose-600 to-pink-600 w-full py-4 rounded-2xl font-black text-lg hover:from-rose-500 hover:to-pink-500 transition-all shadow-lg shadow-rose-900/50 transform hover:scale-[1.02]">Perfeito! ❤️</button>
                <button onclick="closeModal()" class="text-rose-300/60 font-bold text-sm hover:text-rose-300 transition-colors py-2">Fechar</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'cinema-sofia-deivid';
        let firebaseConfig = null;
        if (typeof __firebase_config !== 'undefined') {
            try { firebaseConfig = JSON.parse(__firebase_config); } catch (e) {}
        }

        let app, auth, db;
        if (firebaseConfig) {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
        }

        let movies = [];
        let currentFilter = 'all';
        let isMigrating = false;
        let isCloudActive = false; // Flag para saber se estamos na Nuvem ou Modo Aparelho

        const originalList = [
            { id: 1, title: "Os Vingadores", img: "https://image.tmdb.org/t/p/w500/RYMX2wcKCBAr24UyPD7xwmjaTn.jpg", status: 'conchinha', rating: 0, synopsis: "" },
            { id: 2, title: "Vingadores Era de Ultron", img: "https://image.tmdb.org/t/p/w500/4ssDuvEDkSArWEdyBl2X5EHvYKU.jpg", status: 'conchinha', rating: 0, synopsis: "" },
            { id: 3, title: "Vingadores Guerra Infinita", img: "https://image.tmdb.org/t/p/w500/7WsyChQLEftFiDOVTGkv3hFpyyt.jpg", status: 'conchinha', rating: 0, synopsis: "" },
            { id: 4, title: "Vingadores Ultimato", img: "https://image.tmdb.org/t/p/w500/or06FN3Dka5tukK1e9sl16pB3iy.jpg", status: 'conchinha', rating: 0, synopsis: "" },
            { id: 5, title: "A Culpa é das Estrelas", img: "https://m.media-amazon.com/images/I/91RXDK2vhzL._AC_UF1000,1000_QL80_.jpg", status: 'conchinha', rating: 0, synopsis: "" },
            { id: 6, title: "Como Eu Era Antes de Você", img: "https://m.media-amazon.com/images/M/MV5BMjQ4ZGMyZjYtNDYwNC00MmUyLWE4ZWQtM2ViMTQ0OTc1M2U1XkEyXkFqcGc@._V1_FMjpg_UX1000_.jpg", status: 'conchinha', rating: 0, synopsis: "" },
            { id: 7, title: "Devoradores de Estrelas", img: "./image_5f9dfb.jpg", status: 'cinema', rating: 0, synopsis: "" },
            { id: 8, title: "Homem Aranha Um novo dia", img: "./image_5f9d65.jpg", status: 'cinema', rating: 0, synopsis: "" },
            { id: 9, title: "Vingadores Doomsday", img: "./image_5f9ddc.png", status: 'cinema', rating: 0, synopsis: "" }
        ];

        // --- SISTEMA DE INICIALIZAÇÃO SEGURA ---
        async function startApp() {
            if (!auth) {
                // Modo offline / Aparelho local imediatamente
                initLocalApp();
                return;
            }

            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Erro na autenticação:", error);
                initLocalApp();
                return;
            }

            onAuthStateChanged(auth, (user) => {
                if (user) {
                    isCloudActive = true;
                    listenToCloudUpdates();
                } else {
                    initLocalApp();
                }
            });
        }

        function initLocalApp() {
            isCloudActive = false;
            document.getElementById('sync-status').innerText = "💾 Salvo no Aparelho";
            document.getElementById('sync-status').classList.remove('animate-pulse');
            
            let localMovies = JSON.parse(localStorage.getItem('couple_movies_v4'));
            if (!localMovies || localMovies.length === 0) {
                localMovies = originalList;
                localStorage.setItem('couple_movies_v4', JSON.stringify(localMovies));
            }
            movies = localMovies;
            render();
        }

        function saveLocal() {
            try {
                localStorage.setItem('couple_movies_v4', JSON.stringify(movies));
            } catch (e) {
                alert("Memória do aparelho cheia! Não foi possível salvar.");
            }
        }

        // --- NUVEM ---
        function listenToCloudUpdates() {
            const moviesCol = collection(db, 'artifacts', appId, 'public', 'data', 'movies');
            
            onSnapshot(moviesCol, (snapshot) => {
                const fetchedMovies = [];
                snapshot.forEach(doc => {
                    fetchedMovies.push({ id: doc.id, ...doc.data() });
                });
                
                const hasMigrated = localStorage.getItem('cloud_migrated');

                if (fetchedMovies.length === 0 && !hasMigrated && !isMigrating) {
                    isMigrating = true;
                    document.getElementById('sync-status').innerText = "☁️ Enviando...";
                    
                    let localMovies = JSON.parse(localStorage.getItem('couple_movies_v4'));
                    if (!localMovies || localMovies.length === 0) {
                        localMovies = originalList;
                    }
                    movies = localMovies; 
                    render(); // Renderiza já para não ficar o ecrã vazio
                    
                    migrateToCloud(localMovies).then(() => {
                        localStorage.setItem('cloud_migrated', 'true');
                        document.getElementById('sync-status').innerText = "☁️ Na Nuvem";
                        document.getElementById('sync-status').classList.remove('animate-pulse');
                        isMigrating = false;
                    });
                } else {
                    if (!isMigrating) {
                        movies = fetchedMovies.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
                        document.getElementById('sync-status').innerText = "☁️ Na Nuvem";
                        document.getElementById('sync-status').classList.remove('animate-pulse');
                        render();
                    }
                }
            }, (error) => {
                console.error("Erro ao sincronizar:", error);
                initLocalApp(); // Falha de segurança - cai para LocalStorage
            });
        }

        async function migrateToCloud(list) {
            for (const m of list) {
                const docId = (m.id || Date.now()).toString();
                const movieData = {
                    title: m.title,
                    img: m.img,
                    status: m.status || 'conchinha',
                    rating: m.rating || 0,
                    synopsis: m.synopsis || "",
                    createdAt: m.id || Date.now()
                };
                
                // Prevenção contra limites excessivos de imagem na nuvem
                if (movieData.img && movieData.img.length > 800000) {
                    movieData.img = `https://via.placeholder.com/300x450/4c1d95/f43f5e?text=${encodeURIComponent(movieData.title)}`;
                }
                
                await saveMovieToCloud(docId, movieData);
            }
            localStorage.removeItem('couple_movies_v4');
        }

        async function saveMovieToCloud(id, movieData) {
            if (!db) return;
            try {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'movies', String(id));
                await setDoc(docRef, movieData);
            } catch (e) {
                console.error("Erro ao guardar filme na nuvem:", e);
            }
        }

        async function deleteMovieFromCloud(id) {
            if (!db) return;
            try {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'movies', String(id));
                await deleteDoc(docRef);
            } catch (e) {
                console.error("Erro ao remover filme da nuvem:", e);
            }
        }

        // --- FUNÇÕES EXPOSTAS ---
        window.setFilter = function(filter) {
            currentFilter = filter;
            document.querySelectorAll('[id^="filter-"]').forEach(btn => {
                btn.className = "bg-slate-900/60 hover:bg-slate-800 text-rose-200 px-6 py-2.5 rounded-full text-sm font-semibold transition-all whitespace-nowrap border border-rose-900/30 hover:border-rose-500/50";
            });
            document.getElementById(`filter-${filter}`).className = "bg-rose-600 text-white px-6 py-2.5 rounded-full text-sm font-bold transition-all shadow-lg shadow-rose-900/40 whitespace-nowrap border border-rose-500";
            render();
        }

        window.addMovie = function() {
            const titleInput = document.getElementById('newTitle');
            const fileInput = document.getElementById('newImgFile');
            
            if (!titleInput.value.trim()) return;

            if (fileInput.files && fileInput.files.length > 0) {
                const file = fileInput.files[0];
                const reader = new FileReader();
                
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        const maxWidth = 400; // Compressão para a nuvem não explodir
                        const scale = maxWidth / img.width;
                        canvas.width = maxWidth;
                        canvas.height = img.height * scale;
                        
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        
                        const finalImg = canvas.toDataURL('image/jpeg', 0.7);
                        completeAddMovie(titleInput.value, finalImg);
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            } else {
                const finalImg = `https://via.placeholder.com/300x450/4c1d95/f43f5e?text=${encodeURIComponent(titleInput.value)}`;
                completeAddMovie(titleInput.value, finalImg);
            }
        }

        function completeAddMovie(title, imgData) {
            const selectedStatus = document.querySelector('input[name="newStatus"]:checked').value;
            const docId = Date.now().toString();
            
            const newMovieData = {
                id: docId,
                title: title,
                img: imgData,
                status: selectedStatus,
                rating: 0,
                synopsis: "",
                createdAt: Date.now()
            };

            if (isCloudActive) {
                const cloudData = { ...newMovieData };
                delete cloudData.id;
                saveMovieToCloud(docId, cloudData);
            } else {
                movies.unshift(newMovieData);
                saveLocal();
                render();
            }
            
            document.getElementById('newTitle').value = "";
            document.getElementById('newImgFile').value = "";
            document.getElementById('fileNameDisplay').innerHTML = 'Tocar para escolher foto da galeria<br><span class="text-xs font-normal opacity-70">(ou deixe vazio para uma capa padrão)</span>';
            document.querySelector('input[value="conchinha"]').checked = true;
            
            window.closeAddModal();
        }

        window.updateFileName = function(input) {
            const display = document.getElementById('fileNameDisplay');
            if (input.files && input.files.length > 0) {
                display.innerHTML = `<span class="text-rose-400 font-bold">✅ Foto pronta!</span><br><span class="text-xs truncate max-w-[200px] inline-block mt-1 text-rose-200 bg-rose-950/50 px-2 py-1 rounded-md border border-rose-900/50">${input.files[0].name}</span>`;
            } else {
                display.innerHTML = 'Tocar para escolher foto da galeria<br><span class="text-xs font-normal opacity-70">(ou deixe vazio para uma capa padrão)</span>';
            }
        }

        window.showModal = function(tag, title, content, onConfirm = window.closeModal) {
            document.getElementById('modal-tag').innerText = tag;
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-content').innerText = content;
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modal').classList.add('flex');
            
            const btn = document.getElementById('modal-action-btn');
            btn.onclick = onConfirm;
        }

        window.changeStatus = function(id, newStatus) {
            const movie = movies.find(m => String(m.id) === String(id));
            if (movie) {
                movie.status = newStatus;
                if (isCloudActive) {
                    const updatedMovie = { ...movie };
                    delete updatedMovie.id; 
                    saveMovieToCloud(String(id), updatedMovie);
                } else {
                    saveLocal();
                    render();
                }
            }
        }

        window.rate = function(id, val) {
            const movie = movies.find(m => String(m.id) === String(id));
            if (movie) {
                movie.rating = val;
                if (isCloudActive) {
                    const updatedMovie = { ...movie };
                    delete updatedMovie.id;
                    saveMovieToCloud(String(id), updatedMovie);
                } else {
                    saveLocal();
                    render();
                }
            }
        }

        window.deleteMovie = function(id) {
            if (confirm("Deseja remover este filme para sempre?")) {
                if (isCloudActive) {
                    deleteMovieFromCloud(String(id));
                } else {
                    movies = movies.filter(m => String(m.id) !== String(id));
                    saveLocal();
                    render();
                }
            }
        }

        window.randomPick = function() {
            const pending = movies.filter(m => m.status !== 'assistido');
            if (pending.length === 0) return alert("Vocês já viram todos os filmes da lista!");
            const random = pending[Math.floor(Math.random() * pending.length)];
            
            const ondeVer = random.status === 'cinema' ? "Para ver no Cinema 🍿" : "Sessão de Conchinha 🛋️";
            
            window.showModal("🎲 O Destino Escolheu", random.title, ondeVer, () => {
                window.closeModal();
                window.scrollToMovie(random.id, random.status);
            });
        }

        window.scrollToMovie = function(id, status) {
            if (currentFilter !== 'all' && currentFilter !== status) {
                window.setFilter(status);
            }
            
            setTimeout(() => {
                const card = document.getElementById(`movie-${id}`);
                if (card) {
                    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    card.classList.add('highlight-active');
                    setTimeout(() => { card.classList.remove('highlight-active'); }, 3000);
                }
            }, 100);
        }

        window.closeModal = function() {
            document.getElementById('modal').classList.add('hidden');
            document.getElementById('modal').classList.remove('flex');
        }

        window.openAddModal = function() {
            document.getElementById('add-movie-modal').classList.remove('hidden');
            document.getElementById('add-movie-modal').classList.add('flex');
        }

        window.closeAddModal = function() {
            document.getElementById('add-movie-modal').classList.add('hidden');
            document.getElementById('add-movie-modal').classList.remove('flex');
        }

        function render() {
            const grid = document.getElementById("grid");
            const emptyState = document.getElementById("empty-state");
            const searchTerm = document.getElementById("search").value.toLowerCase();

            let filtered = movies.filter(m => m.title.toLowerCase().includes(searchTerm));

            if (currentFilter !== 'all') {
                filtered = filtered.filter(m => m.status === currentFilter);
            }

            grid.innerHTML = "";
            
            if (filtered.length === 0) {
                emptyState.classList.remove('hidden');
            } else {
                emptyState.classList.add('hidden');
            }

            filtered.forEach(m => {
                const card = document.createElement("div");
                card.id = `movie-${m.id}`;
                card.className = `movie-card relative bg-slate-900/50 backdrop-blur-sm rounded-3xl overflow-hidden shadow-xl border border-rose-900/20 flex flex-col group hover:border-rose-500/50 transition-all`;

                let starsHtml = "";
                for(let i=1; i<=5; i++) {
                    starsHtml += `<button type="button" class="cursor-pointer text-2xl drop-shadow-md transition-all p-1 -m-1 active:scale-125 ${i <= m.rating ? 'text-rose-500 scale-110' : 'text-white/20 md:hover:text-rose-300'}" onclick="rate('${m.id}', ${i})">♥</button>`;
                }

                card.innerHTML = `
                    <div class="relative aspect-[2/3] overflow-hidden">
                        <img src="${m.img}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110 group-hover:rotate-1" onerror="if(!this.src.includes('placeholder')) this.src='https://via.placeholder.com/300x450/4c1d95/f43f5e?text=Sem+Capa'">
                        
                        ${m.status === 'assistido' ? `
                            <div class="watched-overlay absolute inset-0 flex items-center justify-center z-10">
                                <span class="bg-rose-600 text-white px-4 py-1.5 rounded-full text-[11px] font-black uppercase tracking-widest shadow-lg shadow-rose-900/50 flex items-center gap-1 border border-rose-400">
                                    Assistido 💕
                                </span>
                            </div>
                        ` : ''}

                        ${m.status === 'cinema' ? `
                            <div class="absolute top-3 right-3 z-10">
                                <span class="bg-purple-600/90 backdrop-blur-md text-white px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest shadow-lg border border-purple-400">
                                    🍿 Cinema
                                </span>
                            </div>
                        ` : ''}

                        <div class="absolute inset-0 bg-gradient-to-t from-slate-950 via-slate-900/60 to-transparent opacity-0 group-hover:opacity-100 transition-all duration-300 flex flex-col justify-end p-3 z-20">
                            <div class="flex flex-col gap-2 translate-y-4 group-hover:translate-y-0 transition-transform duration-300">
                                <p class="text-[10px] text-center text-rose-200 font-bold uppercase tracking-wider mb-1">Mudar Categoria:</p>
                                <div class="flex gap-2">
                                    <button onclick="changeStatus('${m.id}', 'conchinha')" class="flex-1 ${m.status === 'conchinha' ? 'bg-pink-600 border-pink-400 shadow-md' : 'bg-white/10 border-white/10 hover:bg-white/20'} text-white text-lg py-1.5 rounded-xl border backdrop-blur-md transition-all" title="Ver de Conchinha">
                                        🛋️
                                    </button>
                                    <button onclick="changeStatus('${m.id}', 'cinema')" class="flex-1 ${m.status === 'cinema' ? 'bg-purple-600 border-purple-400 shadow-md' : 'bg-white/10 border-white/10 hover:bg-white/20'} text-white text-lg py-1.5 rounded-xl border backdrop-blur-md transition-all" title="Ver no Cinema">
                                        🍿
                                    </button>
                                    <button onclick="changeStatus('${m.id}', 'assistido')" class="flex-1 ${m.status === 'assistido' ? 'bg-rose-600 border-rose-400 shadow-md' : 'bg-white/10 border-white/10 hover:bg-white/20'} text-white text-lg py-1.5 rounded-xl border backdrop-blur-md transition-all" title="Já Assistimos">
                                        ✅
                                    </button>
                                </div>
                                <button onclick="deleteMovie('${m.id}')" class="mt-1 bg-rose-950/80 hover:bg-red-600 text-rose-300 hover:text-white px-3 py-2 rounded-xl transition-all border border-rose-800/50 backdrop-blur-md text-xs font-bold w-full flex items-center justify-center gap-2">
                                    <span>🗑️</span> Remover Filme
                                </button>
                            </div>
                        </div>
                    </div>
                    <div class="p-4 bg-gradient-to-b from-transparent to-slate-950/50">
                        <h3 class="font-extrabold text-sm truncate mb-2 text-rose-50" title="${m.title}">${m.title}</h3>
                        <div class="flex justify-between items-center">
                            <div class="flex gap-1">${starsHtml}</div>
                        </div>
                    </div>
                `;

                grid.appendChild(card);
            });
        }

        document.getElementById("search").addEventListener("input", render);
        
        // Iniciar o Aplicativo
        startApp();
    </script>
</body>
</html>
